

services:
  # ── Site A: DBLP Node ──────────────────────────────────────
  site-a:
    build:
      context: ./backend
      dockerfile: site-a/Dockerfile
    container_name: kg_site_a
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL_SITE_A: ${DATABASE_URL_SITE_A}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - kg_network

  # ── Site B: Semantic Scholar Node ─────────────────────────
  site-b:
    build:
      context: ./backend
      dockerfile: site-b/Dockerfile
    container_name: kg_site_b
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL_SITE_B: ${DATABASE_URL_SITE_B}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - kg_network

  # ── Coordinator ────────────────────────────────────────────
  coordinator:
    build:
      context: ./backend
      dockerfile: coordinator/Dockerfile
    container_name: kg_coordinator
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL_COORDINATOR: ${DATABASE_URL_COORDINATOR}
      SITE_A_URL: http://site-a:8001
      SITE_B_URL: http://site-b:8002
    depends_on:
      - site-a
      - site-b
    restart: unless-stopped
    networks:
      - kg_network

  # ── Frontend: React Dashboard ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kg_frontend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - coordinator
    networks:
      - kg_network

networks:
  kg_network:
    driver: bridge
