

services:
  # ── Site A: DBLP Node ──────────────────────────────────────
  site-a:
    build:
      context: ./backend
      dockerfile: site-a/Dockerfile
    container_name: kg_site_a
    ports:
      - "8001:8001"
    volumes:
      - ./data-pipeline/output/site_a.db:/app/data/site_a.db:ro
    environment:
      DB_PATH: /app/data/site_a.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - kg_network

  # ── Site B: Semantic Scholar Node ─────────────────────────
  site-b:
    build:
      context: ./backend
      dockerfile: site-b/Dockerfile
    container_name: kg_site_b
    ports:
      - "8002:8002"
    volumes:
      - ./data-pipeline/output/site_b.db:/app/data/site_b.db:ro
    environment:
      DB_PATH: /app/data/site_b.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - kg_network

  # ── Coordinator ────────────────────────────────────────────
  coordinator:
    build:
      context: ./backend
      dockerfile: coordinator/Dockerfile
    container_name: kg_coordinator
    ports:
      - "8000:8000"
    volumes:
      - ./data-pipeline/output/ground_truth.json:/app/data/ground_truth.json:ro
      - coordinator_data:/app/data
    environment:
      SITE_A_URL: http://site-a:8001
      SITE_B_URL: http://site-b:8002
    depends_on:
      - site-a
      - site-b
    restart: unless-stopped
    networks:
      - kg_network

  # ── Frontend: React Dashboard ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kg_frontend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - coordinator
    networks:
      - kg_network

volumes:
  coordinator_data:

networks:
  kg_network:
    driver: bridge
