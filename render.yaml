# render.yaml — Cấu hình deploy 3 backend services lên Render
# Đặt file này ở thư mục gốc của project

services:
  # ── Site A: DBLP Node ──────────────────────────────────────
  - type: web
    name: kg-site-a
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn site-a.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Bạn sẽ điền thủ công trong Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── Site B: Semantic Scholar Node ─────────────────────────
  - type: web
    name: kg-site-b
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn site-b.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Điền connection string Supabase Project 2
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── Coordinator ────────────────────────────────────────────
  - type: web
    name: kg-coordinator
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn coordinator.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Điền connection string Supabase Project 3
      - key: SITE_A_URL
        fromService:
          name: kg-site-a
          type: web
          property: host
      - key: SITE_B_URL
        fromService:
          name: kg-site-b
          type: web
          property: host
      - key: PYTHON_VERSION
        value: 3.11.0
